# git-cliff configuration for makina.
#
# Generates the changelog at release time from Conventional Commits since
# the previous tag. See docs/release.md for the full release flow.

[changelog]
header = """# Changelog

All notable changes to this project are documented here.
This file is generated by git-cliff from the Conventional Commits log.

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}** {% endif %}{{ commit.message | upper_first }}\
{% if commit.github.pr_number %} ([#{{ commit.github.pr_number }}]({{ self::repo_url() }}/pull/{{ commit.github.pr_number }})){% endif %}
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = false
require_conventional = true
split_commits = false
commit_parsers = [
  { message = "^feat",     group = "Features" },
  { message = "^fix",      group = "Bug fixes" },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs",     group = "Documentation" },
  { message = "^test",     group = "Tests" },
  { message = "^build",    group = "Build" },
  { message = "^ci",       group = "CI" },
  { message = "^chore",    group = "Chores" },
  { message = "^revert",   group = "Reverts" },
  { body    = "^BREAKING CHANGE:", group = "BREAKING CHANGES" },
]
commit_preprocessors = []
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+(-rc\\.[0-9]+)?"
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
