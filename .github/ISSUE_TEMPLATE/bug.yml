name: Bug report
description: A defect in shipped behavior.
title: "fix: "
labels:
  - type:bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence describing what is broken.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Output of `makina --version`, `deno --version`, OS + architecture.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Tail of `~/Library/Logs/makina/daemon.log` and any stack trace.
    validations:
      required: false
